seed: 42

dataset:
  name: hdfs_xu
  root: data
  format: pregrouped_sequences
  train_sequences: hdfs_train.txt
  test_normal_sequences: hdfs_test_normal.txt
  test_abnormal_sequences: hdfs_test_abnormal.txt
  raw_log: HDFS.log
  structured_log: HDFS.log_structured.csv
  labels: anomaly_label.csv
  second_dataset:
    enabled: false
    name: bgl
    root: data/bgl
    raw_log: BGL.log
    labels: BGL_labels.csv

features:
  representation: bag_of_events
  min_count: 1
  normalize: l2
  max_vocab_size: null
  unknown_token: <UNK>
  max_sequence_length: null
  positional_encoding_type: absolute

baselines:
  isolation_forest:
    contamination: 0.1
    n_estimators: 200
    random_state: 42
  pca:
    n_components: 0.95

vae:
  latent_dims: [8, 16, 32]
  hidden_dim: 128
  learning_rate: 0.001
  epochs: 40
  batch_size: 64
  beta_values: [0.5, 1.0, 2.0]
  threshold_percentile: 95
  validation_split: 0.2
  beta_warmup_epochs: 0

analysis:
  embedding_method: umap
  trajectory_window: 8
  failure_clustering: dbscan
  dbscan_eps: 0.8
  dbscan_min_samples: 5
  kmeans_k: 4

synthetic_injection:
  enabled: true
  ratio: 0.1
  modes: [insert, remove, shuffle]

outputs:
  root: results
  run_name: default_run
  save_plots: true
